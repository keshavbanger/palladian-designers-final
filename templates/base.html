{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="format-detection" content="telephone=no" />
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700">
    <link rel="shortcut icon" type="image/png" href="{% static 'img/favicon.ico' %}" />
    <link rel="stylesheet" href="{% static 'css/swiper.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/slick.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/magnific-popup.css'%}">
    <link rel="stylesheet" href="{% static 'font-awesome/css/font-awesome.min.css'%}">
    <link rel="stylesheet" href="{% static 'css/et-line-font.css'%}">
    <link rel="stylesheet" href="{% static 'css/before-after.min.css'%}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css'%}">
    <link rel="stylesheet" href="{% static 'css/unit-test.css'%}">
    <link rel="stylesheet" href="{% static 'css/style.css'%}">
    {% comment %}
    <link href="{% static 'fontawesome_free/css/all.min.css' %}" rel="stylesheet" type="text/css"> {% endcomment %}
    {% comment %}
    <script src="{% static 'fontawesome_free/js/all.min.js' %}"></script> {% endcomment %}
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        /* Style for the container */
        .file-input-container {
            position: relative;
            width: 200px;
            margin: 20px;
        }

        /* Style for the file input */
        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Style for the fake button */
        .fake-button {
            display: inline-block;
            padding: 10px;
            background-color: #4c4c4c;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>

</head>

<body>
    <!--PRELOADER REMOVED FOR BETTER UX-->

    <!--HEADER-->
    {% include "header.html" %}
    <!--END HEADER-->

    <!--MAIN BODY-->
    {% block content %}{% endblock content %}
    <!--/MAIN BODY-->

    <!-- START FOOTER -->
    {% include "footer.html" %}
    <!--/END FOOTER-->

    <script src="{% static 'js/jquery.js'%}"></script>
    <script src="{% static 'js/jquery.magnific-popup.min.js'%}"></script>
    <script src="{% static 'js/swiper.min.js'%}"></script>
    <script src="{% static 'js/hammer.min.js'%}"></script>
    <script src="{% static 'js/foxlazy.min.js'%}"></script>
    <script src="{% static 'js/all.js'%}"></script>
    <script src="{% static 'js/vivus.min.js' %}"></script>
    <script src="{% static 'js/isotope.pkgd.min.js' %}"></script>

</body>

</html>
